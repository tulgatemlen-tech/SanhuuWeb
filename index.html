<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Hello, world!</title>
  </head>
  <body id="index" class="roboto-regular">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm p-4 rounded-4">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4 fw-bold text-success"><i class="fa-solid fa-sack-dollar text-warning"></i> Хувийн санхүү бүртгэл</h3>
                        <form id="auth-form">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Имэйл хаяг</label>
                                <input type="email" class="form-control form-control-lg" id="email" required placeholder="Имэйл хаяг">
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-semibold">Нууц үг</label>
                                <input type="password" class="form-control form-control-lg" id="password" required placeholder="Нууц үг">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" id="btn-login" class="btn btn-success btn-lg fw-semibold"> Нэвтрэх </button>
                                <button type="button" id="btn-register" class="btn btn-outline-secondary"> Шинээр бүртгүүлэх</button>
                            </div>
                        </form>
                        <div id="message" class="text-danger text-center small mt-3 fw-medium"></div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
    
    <script type="module" src="js/auth.js"></script>
    <script src="https://kit.fontawesome.com/02042e808f.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" ></script>
  </body>
</html>
